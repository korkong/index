<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share My Card</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f3f4f6; color: #333; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #06C755; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <p>กำลังส่งนามบัตรเข้าห้องแชท...</p>

    <script>
        async function main() {
            try {
                // 1. กำหนด LIFF ID ของคุณ
                await liff.init({ liffId: "2009852964-mHSj93sF" });

                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    // ใช้คำสั่งส่งเข้าแชทปัจจุบัน (ต้องติ๊ก chat_message.write ใน Console ด้วยนะ)
                    await liff.sendMessages([
                        {
                            "type": "flex",
                            "altText": "คุณได้รับนามบัตรของ วศิน",
                            "contents": {
                                "type": "bubble",
                                "hero": {
                                    "type": "image",
                                    "url": "https://img2.pic.in.th/pic/wasin-profile.png", 
                                    "size": "full",
                                    "aspectRatio": "3:4",
                                    "aspectMode": "cover"
                                },
                                "body": {
                                    "type": "box",
                                    "layout": "vertical",
                                    "contents": [
                                        { "type": "text", "text": "วศิน ศรีเจริญวะนะกิจ", "weight": "bold", "size": "xl" },
                                        { "type": "text", "text": "Wasin Sricharoenwanakit", "size": "sm", "color": "#8c8c8c" },
                                        { "type": "separator", "margin": "md" },
                                        {
                                            "type": "box", "layout": "vertical", "margin": "lg", "spacing": "sm",
                                            "contents": [
                                                { "type": "text", "text": "✉️ E-mail: wasin.sricharoen@gmail.com", "size": "sm", "color": "#8c8c8c" },
                                                { "type": "text", "text": "📞 Tell: 0857269610", "size": "sm", "color": "#8c8c8c" }
                                            ]
                                        }
                                    ]
                                },
                                "footer": {
                                    "type": "box", "layout": "vertical", "spacing": "sm",
                                    "contents": [
                                        {
                                            "type": "box", "layout": "horizontal", "spacing": "sm",
                                            "contents": [
                                                { "type": "button", "style": "primary", "height": "sm", "color": "#22C55E", "action": { "type": "uri", "label": "Call", "uri": "tel:0857269610" } },
                                                { "type": "button", "style": "secondary", "height": "sm", "color": "#E2E8F0", "action": { "type": "uri", "label": "Share Card", "uri": "https://liff.line.me/2009852964-mHSj93sF" } }
                                            ]
                                        }
                                    ]
                                }
                            }
                        }
                    ]);
                    // ส่งเสร็จแล้วปิดหน้าต่างทันที
                    liff.closeWindow();
                }
            } catch (err) {
                console.error(err);
                alert("เกิดข้อผิดพลาด: " + err.message + "\nอย่าลืมติ๊กถูกที่ chat_message.write ในหน้า Console นะครับ");
            }
        }
        main();
    </script>
</body>
</html>
